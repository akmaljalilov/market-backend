version: "2"
sql:
    - engine: "postgresql"
      queries: "./db/query/"
      schema: "./db/migrations/"
      gen:
          go:
              package: "postgres"
              out: "./db/query"
              sql_package: "pgx/v5"
              emit_json_tags: true
              emit_prepared_queries: false
              emit_interface: true
              emit_pointers_for_null_types: true
              emit_exact_table_names: false
              overrides:
                - go_type:
                    type: "int"
                    pointer: true
                  db_type: "pg_catalog.int4"
                  nullable: true
                - go_type:
                    type: "int"
                  db_type: "pg_catalog.int4"
